<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistique | Yuko Vape</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #050505; color: white; -webkit-font-smoothing: antialiased; }
        
        nav { display: flex; justify-content: space-between; padding: 25px 5%; align-items: center; background: #000; position: fixed; width: 90%; z-index: 1000; border-bottom: 1px solid #111; }
        .nav-logo { font-weight: 900; text-transform: uppercase; text-decoration: none; color: white; letter-spacing: 1px; }
        .nav-logo span { color: #007bff; }
        .nav-links a { color: #888; margin-left: 20px; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }

        .container { padding: 150px 5% 50px 5%; max-width: 1000px; margin: 0 auto; text-align: center; }
        h1 { font-size: 2.5rem; text-transform: uppercase; margin-bottom: 20px; font-weight: 900; }

        .map-box {
            position: relative; width: 100%; max-width: 900px; margin: 0 auto; 
            background: #080808; border-radius: 20px; border: 1px solid #1a1a1a; 
            aspect-ratio: 16/9; overflow: hidden;
        }

        .map-svg { width: 100%; height: 100%; }

        /* Styles des Pays - TRACÉS RÉELS */
        .country { fill: #111; stroke: #222; stroke-width: 0.5; }
        .active-country { fill: rgba(0, 123, 255, 0.05); stroke: #007bff; stroke-width: 1.5; }
        .poland-country { fill: rgba(255, 255, 255, 0.05); stroke: #ffffff; stroke-width: 1.5; }

        /* Marqueurs */
        .marker { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .label { margin-top: 10px; padding: 6px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; white-space: nowrap; }

        /* Hub Pologne */
        .m-pl { top: 35%; left: 72%; }
        .m-pl .dot { width: 14px; height: 14px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff; }
        .m-pl .label { background: #fff; color: #000; }

        /* Destinations */
        .m-fr { top: 68%; left: 25%; }
        .m-be { top: 44%; left: 28%; }
        .m-ch { top: 68%; left: 40%; }
        .dot-blue { width: 10px; height: 10px; background: #007bff; border-radius: 50%; box-shadow: 0 0 15px #007bff; }
        .label-blue { background: rgba(0,0,0,0.9); border: 1px solid #007bff; color: white; }
        .time { display: block; color: #007bff; font-size: 0.6rem; margin-top: 2px; }

        footer { padding: 60px; text-align: center; color: #222; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">Yuko <span>Vape</span></a>
        <div class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="https://t.me/TON_ID" style="color: #007bff;">Telegram</a>
        </div>
    </nav>

    <div class="container">
        <h1>L'Excellence Logistique</h1>
        
        <div class="map-box">
            <svg class="map-svg" viewBox="0 0 800 500">
                <path class="country active-country" d="M211.2,336.5l-3.3-10.4l1.3-17.5l-13.8-19.4l0.1-13.8l-15.1-16.1l3.3-26.6l16.1-15.1l31.1,5.3l18.4,26.4l20.4,4.2l-3.4,46.2l-14.8,36.9L211.2,336.5z" />
                
                <path class="country poland-country" d="M515.6,134.1l42.3-5.3l37.8,20.5l1.6,48.5l-44,29.9l-48.5-8.8l-18.7-39.6L515.6,134.1z" />
                
                <path class="country active-country" d="M217.2,192.5l16.2-4.1l11,10.6l-5.3,16.2l-16.2,2.3L217.2,192.5z" />
                
                <path class="country active-country" d="M298.5,274.5l30.8-5l10.4,15.6l-20.4,15.6l-20.4-5.3L298.5,274.5z" />
            </svg>

            <div class="marker m-pl">
                <div class="dot"></div>
                <div class="label">Entrepôt PL</div>
            </div>

            <div class="marker m-fr">
                <div class="dot-blue"></div>
                <div class="label label-blue">France <span class="time">5-7 Jours</span></div>
            </div>

            <div class="marker m-be">
                <div class="dot-blue"></div>
                <div class="label label-blue">Belgique <span class="time">5-7 Jours</span></div>
            </div>

            <div class="marker m-ch">
                <div class="dot-blue"></div>
                <div class="label label-blue">Suisse <span class="time">5-7 Jours</span></div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 YUKO VAPE - Distribution Premium</footer>
</body>
</html>

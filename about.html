<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistique | Yuko Vape</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #050505; color: white; -webkit-font-smoothing: antialiased; }
        
        nav { display: flex; justify-content: space-between; padding: 25px 5%; align-items: center; background: #000; position: fixed; width: 90%; z-index: 1000; border-bottom: 1px solid #111; }
        .nav-logo { font-weight: 900; text-transform: uppercase; text-decoration: none; color: white; letter-spacing: 1px; }
        .nav-logo span { color: #007bff; }
        .nav-links a { color: #888; margin-left: 20px; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }

        .container { padding: 150px 5% 50px 5%; max-width: 1000px; margin: 0 auto; text-align: center; }
        
        h1 { font-size: 2.5rem; text-transform: uppercase; margin-bottom: 20px; }
        .intro-text { color: #888; margin-bottom: 60px; max-width: 700px; margin-left: auto; margin-right: auto; }

        /* CARTE PROPRE */
        .map-box {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 40px 10px;
            overflow: hidden;
        }

        /* On utilise une image de carte de l'Europe sombre et propre */
        .europe-bg {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0.2;
            filter: grayscale(1) invert(1);
        }

        /* Points de localisation */
        .marker {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #007bff;
            border-radius: 50%;
            box-shadow: 0 0 15px #007bff;
        }

        .label {
            margin-top: 8px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            background: rgba(0,0,0,0.8);
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .time { color: #007bff; font-size: 0.6rem; display: block; margin-top: 2px; }

        /* Positions précises sur l'image de fond */
        .m-pl { top: 35%; left: 65%; } /* Pologne - Komorniki */
        .m-fr { top: 65%; left: 30%; } /* France */
        .m-be { top: 45%; left: 38%; } /* Belgique */
        .m-ch { top: 70%; left: 48%; } /* Suisse */

        .m-pl .dot { background: #fff; box-shadow: 0 0 15px #fff; width: 14px; height: 14px; }
        .m-pl .label { border: 1px solid #fff; color: #fff; }

        footer { padding: 40px; color: #222; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">YUKO <span>VAPE</span></a>
        <div class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="https://t.me/TON_ID" style="color: #007bff;">Telegram</a>
        </div>
    </nav>

    <div class="container">
        <h1>Logistique Europe</h1>
        <p class="intro-text">Un hub central en Pologne pour servir la France, la Belgique et la Suisse en un temps record.</p>

        <div class="map-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Blank_map_of_Europe_cropped.svg/800px-Blank_map_of_Europe_cropped.svg.png" class="europe-bg" alt="Europe Map">

            <div class="marker m-pl">
                <div class="dot"></div>
                <div class="label">ENTREPÔT PL</div>
            </div>

            <div class="marker m-fr">
                <div class="dot"></div>
                <div class="label">FRANCE <span class="time">5-7 JOURS</span></div>
            </div>

            <div class="marker m-be">
                <div class="dot"></div>
                <div class="label">BELGIQUE <span class="time">5-7 JOURS</span></div>
            </div>

            <div class="marker m-ch">
                <div class="dot"></div>
                <div class="label">SUISSE <span class="time">5-7 JOURS</span></div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 YUKO VAPE - Distribution Premium</footer>
</body>
</html>

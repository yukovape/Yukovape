<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande B2B | Yuko Vape</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #050505; color: white; -webkit-font-smoothing: antialiased; }
        nav { display: flex; justify-content: space-between; padding: 25px 5%; align-items: center; background: #000; position: fixed; width: 90%; z-index: 1000; border-bottom: 1px solid #111; }
        .nav-logo { font-weight: 900; text-transform: uppercase; text-decoration: none; color: white; }
        .nav-logo span { color: #007bff; }
        
        .container { padding: 140px 5% 80px 5%; max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }
        
        .product-view { position: sticky; top: 140px; height: fit-content; }
        .img-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 20px; text-align: center; }
        .product-img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        
        /* TABLEAU DES PRIX DÉGRESSIFS */
        .price-tiers { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tier { flex: 1; background: #111; border: 1px solid #222; padding: 10px; border-radius: 8px; text-align: center; transition: 0.3s; }
        .tier.active { border-color: #007bff; background: rgba(0, 123, 255, 0.1); box-shadow: 0 0 15px rgba(0, 123, 255, 0.2); }
        .tier-qty { font-size: 0.6rem; color: #555; text-transform: uppercase; font-weight: 900; }
        .tier-price { font-size: 1.1rem; font-weight: 900; display: block; margin-top: 5px; }
        .tier.active .tier-qty { color: #007bff; }

        .order-zone { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 30px; }
        h2 { font-weight: 900; text-transform: uppercase; margin-top: 0; }
        
        .add-box-btn { width: 100%; padding: 15px; background: transparent; border: 2px dashed #007bff; color: #007bff; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .add-box-btn:hover { background: rgba(0,123,255,0.1); }

        .box-item { background: #111; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid #222; animation: slideIn 0.3s ease; }
        select { background: #000; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 5px; width: 60%; font-family: 'Montserrat'; }
        .remove-btn { color: #ff4444; cursor: pointer; font-weight: 900; font-size: 1.2rem; margin-left: 10px; }

        .summary { background: #000; border: 1px solid #007bff; padding: 20px; border-radius: 12px; margin-top: 30px; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .total-row { display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 15px; margin-top: 10px; font-size: 1.5rem; font-weight: 900; }

        .upsell-msg { font-size: 0.75rem; color: #00ff88; font-weight: 700; text-align: center; margin-top: 10px; min-height: 1rem; }

        .btn-tg { display: block; width: 100%; padding: 20px; background: #fff; color: #000; text-align: center; text-decoration: none; border-radius: 10px; font-weight: 900; text-transform: uppercase; margin-top: 20px; box-sizing: border-box; }
        .btn-tg.disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } .product-view { position: relative; top: 0; } }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">Yuko <span>Vape</span></a>
</nav>

<div class="container">
    <div class="product-view">
        <div class="img-card">
            <img src="Gemini_Generated_Image_ar5ajear5ajear5a.jpg" class="product-img">
            <h2 style="margin:0;">RAZZ BAR 30K</h2>
            <p style="color:#555; font-size: 0.75rem; letter-spacing: 1px;">UNITÉ : PACK DE 10 PCS</p>
        </div>
    </div>

    <div class="order-zone">
        <h2>Tarifs Dégressifs</h2>
        
        <div class="price-tiers">
            <div id="tier-1" class="tier">
                <span class="tier-qty">30+ PCS</span>
                <span class="tier-price">6.70€</span>
            </div>
            <div id="tier-2" class="tier">
                <span class="tier-qty">50+ PCS</span>
                <span class="tier-price">6.10€</span>
            </div>
            <div id="tier-3" class="tier">
                <span class="tier-qty">70+ PCS</span>
                <span class="tier-price">5.20€</span>
            </div>
        </div>

        <button class="add-box-btn" onclick="addBox()">+ AJOUTER UNE BOÎTE (10 PCS)</button>
        
        <div id="cart-items"></div>

        <div class="summary">
            <div class="price-row">
                <span>Quantité totale :</span>
                <span id="total-qty">0 pcs</span>
            </div>
            <div class="price-row">
                <span>Prix unitaire actuel :</span>
                <span id="unit-price" style="color:#007bff; font-weight:900;">6.70 €</span>
            </div>
            <div class="total-row">
                <span>TOTAL</span>
                <span id="grand-total">0.00 €</span>
            </div>
            <div id="upsell" class="upsell-msg"></div>
            <p id="min-warn" style="color:#ff4444; font-size:0.65rem; font-weight:900; margin-top:10px; text-align:center;">MINIMUM REQUIS : 3 BOÎTES</p>
        </div>

        <a href="#" id="tg-submit" class="btn-tg disabled">Finaliser sur Telegram</a>
    </div>
</div>

<script>
    const flavors = [
        "Triple Melon", "Strawberry Ice", "Sour Apple", "Mango Peach Watermelon", 
        "Strawberry Banana", "Blueberry Ice", "Juicy Peach Ice", "Strawberry Kiwi", 
        "Watermelon Ice", "Summer Dream", "Strawberry Watermelon", "Mixed Berries", 
        "Blue Razz Ice", "Lemon Lime", "Cola Ice", "Blackberry Ice"
    ];

    let boxes = [];

    function addBox() {
        boxes.push({ id: Date.now(), flavor: flavors[0] });
        renderCart();
    }

    function removeBox(id) {
        boxes = boxes.filter(b => b.id !== id);
        renderCart();
    }

    function updateFlavor(id, flavor) {
        const box = boxes.find(b => b.id === id);
        if (box) box.flavor = flavor;
        calculate(); // Mettre à jour le message Telegram sans recharger la liste
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        container.innerHTML = '';
        boxes.forEach((box, index) => {
            const div = document.createElement('div');
            div.className = 'box-item';
            div.innerHTML = `
                <span style="font-weight:900; font-size:0.7rem; color:#444;">BOÎTE ${index+1}</span>
                <select onchange="updateFlavor(${box.id}, this.value)">
                    ${flavors.map(f => `<option value="${f}" ${box.flavor === f ? 'selected' : ''}>${f}</option>`).join('')}
                </select>
                <span class="remove-btn" onclick="removeBox(${box.id})">×</span>
            `;
            container.appendChild(div);
        });
        calculate();
    }

    function calculate() {
        const qty = boxes.length * 10;
        let price = 6.70;
        let nextTier = "";

        // Logique des paliers
        document.querySelectorAll('.tier').forEach(t => t.classList.remove('active'));
        
        if (qty >= 70) {
            price = 5.20;
            document.getElementById('tier-3').classList.add('active');
            nextTier = "Félicitations ! Vous bénéficiez du tarif VIP.";
        } else if (qty >= 50) {
            price = 6.10;
            document.getElementById('tier-2').classList.add('active');
            nextTier = `Plus que ${70 - qty} pièces pour passer à 5.20 € !`;
        } else {
            price = 6.70;
            if (qty >= 30) document.getElementById('tier-1').classList.add('active');
            nextTier = qty >= 10 ? `Plus que ${50 - qty} pièces pour passer à 6.10 € !` : "";
        }

        const total = qty * price;
        document.getElementById('total-qty').innerText = qty + " pcs";
        document.getElementById('unit-price').innerText = price.toFixed(2) + " €";
        document.getElementById('grand-total').innerText = total.toFixed(2) + " €";
        document.getElementById('upsell').innerText = nextTier;

        const btn = document.getElementById('tg-submit');
        const warn = document.getElementById('min-warn');

        if (qty >= 30) {
            btn.classList.remove('disabled');
            warn.style.display = 'none';
        } else {
            btn.classList.add('disabled');
            warn.style.display = 'block';
        }

        let detailParfums = boxes.map((b, i) => `Pack ${i+1}: ${b.flavor}`).join('\n');
        let message = `Bonjour Yuko Vape, commande Razz Bar 30K :\n\n${detailParfums}\n\nQuantité: ${qty} pcs\nPrix: ${price.toFixed(2)}€/u\nTOTAL: ${total.toFixed(2)}€`;
        btn.href = "https://t.me/TON_ID?text=" + encodeURIComponent(message);
    }

    // Initialisation
    for(let i=0; i<3; i++) addBox();
</script>

</body>
</html>

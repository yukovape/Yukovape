<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaire B2B | Yuko Vape</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #050505; color: white; -webkit-font-smoothing: antialiased; }
        
        /* Navigation Corrigée pour Ordinateur */
        nav { display: flex; justify-content: space-between; padding: 25px 5%; align-items: center; background: #000; position: fixed; width: 90%; z-index: 1000; border-bottom: 1px solid #111; }
        .nav-logo { font-weight: 900; text-transform: uppercase; text-decoration: none; color: white; white-space: nowrap; min-width: fit-content; }
        .nav-logo span { color: #007bff; }
        .nav-links a { color: #888; margin-left: 20px; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }

        .main-container { padding: 140px 5% 100px 5%; max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 400px; gap: 40px; }

        /* Grille Produits */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 30px; }
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }

        /* Images plein format */
        .product-img-header { width: 100%; height: 350px; background: #000; overflow: hidden; }
        .product-img-header img { width: 100%; height: 100%; object-fit: cover; }

        .product-content { padding: 25px; }
        .product-badge { color: #007bff; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .product-title { font-size: 1.6rem; font-weight: 900; margin: 10px 0; }

        /* Sélecteurs */
        .order-controls { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 20px; }
        select, .btn-add { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; font-family: 'Montserrat'; font-size: 0.8rem; cursor: pointer; }
        .btn-add { background: #007bff; color: white; border: none; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
        .btn-add:hover { background: #0056b3; }

        /* Sidebar Panier */
        .sidebar-cart { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 30px; position: sticky; top: 140px; height: fit-content; }
        .cart-title { font-weight: 900; text-transform: uppercase; font-size: 1.2rem; margin-bottom: 25px; }
        .cart-items { max-height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #007bff; font-size: 0.8rem; position: relative; }
        .remove-item { position: absolute; right: 10px; top: 10px; color: #ff4444; cursor: pointer; font-weight: 900; }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .total-row { font-size: 1.8rem; font-weight: 900; margin-top: 10px; }
        
        .btn-finalize { display: block; width: 100%; padding: 20px; background: #fff; color: #000; text-align: center; text-decoration: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        .btn-finalize:hover { background: #007bff; color: white; }
        .btn-finalize.disabled { opacity: 0.2; pointer-events: none; }

        @media (max-width: 1000px) { .main-container { grid-template-columns: 1fr; } .sidebar-cart { position: relative; top: 0; } }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">Yuko <span>Vape</span></a>
    <div class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="about.html">Logistique</a>
    </div>
</nav>

<div class="main-container">
    <div class="products-grid">
        
        <div class="product-card">
            <div class="product-img-header">
                <img src="Gemini_Generated_Image_ar5ajear5ajear5a.jpg" alt="Razz Bar">
            </div>
            <div class="product-content">
                <span class="product-badge">Top Ventes - 30 000 Puffs</span>
                <h2 class="product-title">RAZZ BAR 30K</h2>
                <div class="order-controls">
                    <select id="flavor-razz">
                        <option value="Triple Melon">Triple Melon</option>
                        <option value="Strawberry Ice">Strawberry Ice</option>
                        <option value="Sour Apple">Sour Apple</option>
                        <option value="Mango Peach Watermelon">Mango Peach Watermelon</option>
                        <option value="Strawberry Banana">Strawberry Banana</option>
                        <option value="Blueberry Ice">Blueberry Ice</option>
                        <option value="Juicy Peach Ice">Juicy Peach Ice</option>
                        <option value="Strawberry Kiwi">Strawberry Kiwi</option>
                        <option value="Watermelon Ice">Watermelon Ice</option>
                        <option value="Summer Dream">Summer Dream</option>
                        <option value="Strawberry Watermelon">Strawberry Watermelon</option>
                        <option value="Mixed Berries">Mixed Berries</option>
                        <option value="Blue Razz Ice">Blue Razz Ice</option>
                        <option value="Lemon Lime">Lemon Lime</option>
                        <option value="Cola Ice">Cola Ice</option>
                        <option value="Blackberry Ice">Blackberry Ice</option>
                    </select>
                    <select id="nic-razz">
                        <option value="2%">2% Nic</option>
                        <option value="5%">5% Nic</option>
                    </select>
                </div>
                <button class="btn-add" style="width:100%; margin-top:10px;" onclick="addToCart('RAZZ BAR 30K', 'razz')">+ Ajouter un Pack (10 pcs)</button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-img-header">
                <img src="jnr puff.jpg" alt="JNR Falcon-X">
            </div>
            <div class="product-content">
                <span class="product-badge">Écran HD - 18 000 Puffs</span>
                <h2 class="product-title">JNR FALCON-X 18K</h2>
                <div class="order-controls">
                    <select id="flavor-jnr">
                        <option value="Black Ice">Black Ice</option>
                        <option value="Blue Razz Cherry">Blue Razz Cherry</option>
                        <option value="Blue Razz Ice">Blue Razz Ice</option>
                        <option value="Cherry Watermelon Freeze">Cherry Watermelon Freeze</option>
                        <option value="Fizzy Cherry Cola">Fizzy Cherry Cola</option>
                        <option value="Dragon Fruit">Dragon Fruit</option>
                        <option value="Hawaii">Hawaii</option>
                        <option value="Tropicana Zest">Tropicana Zest</option>
                        <option value="Love 66">Love 66</option>
                        <option value="Zesty Marmalade Crunch">Zesty Marmalade Crunch</option>
                        <option value="Kiwi Passion Fruit Guava">Kiwi Passion Fruit Guava</option>
                        <option value="Mango Passion">Mango Passion</option>
                        <option value="Passion Fruit Kiwi">Passion Fruit Kiwi</option>
                        <option value="Cherry Berry">Cherry Berry</option>
                        <option value="Mixed Berries">Mixed Berries</option>
                        <option value="Peach Berry">Peach Berry</option>
                        <option value="Strawberry Ice">Strawberry Ice</option>
                        <option value="Strawberry Kiwi">Strawberry Kiwi</option>
                        <option value="Watermelon Ice">Watermelon Ice</option>
                        <option value="Watermelon Mango Peach">Watermelon Mango Peach</option>
                        <option value="White Peach Razz">White Peach Razz</option>
                    </select>
                    <select id="nic-jnr">
                        <option value="2%">2% Nic (Unique)</option>
                    </select>
                </div>
                <button class="btn-add" style="width:100%; margin-top:10px;" onclick="addToCart('JNR FALCON-X 18K', 'jnr')">+ Ajouter un Pack (10 pcs)</button>
            </div>
        </div>

    </div>

    <div class="sidebar-cart">
        <div class="cart-title">📦 Votre Commande</div>
        <div id="cart-list" class="cart-items">
            <p id="empty-msg" style="color:#444; font-size:0.8rem;">Votre panier est vide.</p>
        </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span>Quantité Totale :</span>
                <span id="total-qty">0 pcs</span>
            </div>
            <div class="total-row">
                <span style="font-size:0.8rem; color:#007bff; display:block;">TOTAL ESTIMÉ</span>
                <span id="grand-total">0.00 €</span>
            </div>
            <a href="#" id="tg-btn" class="btn-finalize disabled">Finaliser sur Telegram</a>
        </div>
    </div>
</div>

<script>
    let cart = [];

    function addToCart(name, idPrefix) {
        const flavor = document.getElementById(`flavor-${idPrefix}`).value;
        const nic = document.getElementById(`nic-${idPrefix}`).value;
        cart.push({ name, flavor, nic, id: Date.now() });
        renderCart();
    }

    function removeItem(id) {
        cart = cart.filter(item => item.id !== id);
        renderCart();
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        if (cart.length === 0) {
            list.innerHTML = '<p id="empty-msg" style="color:#444; font-size:0.8rem;">Votre panier est vide.</p>';
        } else {
            cart.forEach(item => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span class="remove-item" onclick="removeItem(${item.id})">×</span>
                    <strong>${item.name}</strong><br><span style="color:#888;">${item.flavor} | ${item.nic}</span>`;
                list.appendChild(div);
            });
        }
        updateTotal();
    }

    function updateTotal() {
        const qty = cart.length * 10;
        let total = 0;
        cart.forEach(item => {
            let price = 0;
            if (item.name.includes('RAZZ')) {
                if (qty >= 70) price = 5.20; else if (qty >= 50) price = 6.10; else price = 6.70;
            } else {
                if (qty >= 70) price = 4.80; else if (qty >= 50) price = 5.60; else price = 6.20;
            }
            total += (10 * price);
        });
        document.getElementById('total-qty').innerText = qty + " pcs";
        document.getElementById('grand-total').innerText = total.toFixed(2) + " €";
        const btn = document.getElementById('tg-btn');
        if (qty >= 30) {
            btn.classList.remove('disabled');
            let message = "Bonjour Yuko Vape, commande :\n" + cart.map((item, i) => `${i+1}. ${item.name} - ${item.flavor} (${item.nic})`).join('\n') + `\n\nTotal: ${qty} pcs\nTotal estimé: ${total.toFixed(2)}€`;
            btn.href = "https://t.me/fildurasoir?text=" + encodeURIComponent(message);
        } else { btn.classList.add('disabled'); }
    }
</script>
</body>
</html>

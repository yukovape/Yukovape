<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuko Vape | Premium Wholesale</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Montserrat:wght@900&display=swap');
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        
        /* Navigation adaptative */
        nav { display: flex; justify-content: space-between; padding: 20px 5%; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); position: fixed; width: 90%; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .nav-logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .nav-logo span { color: #007bff; }
        .nav-links a { color: #888; margin-left: 20px; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }

        /* Hero Section */
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at center, #111 0%, #000 100%); padding: 80px 5% 40px 5%; box-sizing: border-box; }
        
        /* LOGO Dynamique */
        .hero-logo { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; width: 100%; }
        .hero-logo-yuko { 
            font-size: clamp(4rem, 15vw, 10rem); /* S'adapte entre 4rem et 10rem selon l'écran */
            line-height: 0.8; 
            letter-spacing: -2px; 
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-logo-vape { 
            font-size: clamp(2rem, 8vw, 5rem); 
            color: #007bff; 
            line-height: 0.8; 
            letter-spacing: clamp(5px, 2vw, 15px);
            margin-top: 10px;
        }

        h1 { font-size: clamp(1.2rem, 4vw, 2.5rem); margin: 20px 0 10px 0; font-weight: 300; letter-spacing: 1px; text-transform: uppercase; }
        .tagline { color: #666; font-size: clamp(0.9rem, 3vw, 1.1rem); margin-bottom: 40px; padding: 0 10%; }
        
        /* Boutons adaptatifs */
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 500px; }
        .btn { 
            padding: 18px 30px; 
            border-radius: 5px; 
            font-weight: 800; 
            text-decoration: none; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            flex: 1; /* Les boutons prennent la même largeur */
            min-width: 250px; /* Force l'empilement sur petit mobile */
            box-sizing: border-box;
            transition: 0.3s;
        }
        .btn-primary { background: #fff; color: #000; }
        .btn-telegram { border: 2px solid #229ED9; color: #229ED9; }

        /* Grille de Features */
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 60px 5%; background: #000; border-top: 1px solid #1a1a1a; }
        .feature-card { padding: 30px; text-align: center; border: 1px solid #111; }
        .feature-card h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .feature-card p { color: #555; font-size: 0.8rem; line-height: 1.5; }

        /* Correction spécifique pour mobile */
        @media (max-width: 600px) {
            nav { padding: 15px 5%; }
            .nav-links a { margin-left: 10px; font-size: 0.7rem; }
            .hero-logo-yuko { letter-spacing: -1px; }
            .btn { width: 100%; flex: none; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">Yuko <span>Vape</span></div>
        <div class="nav-links">
            <a href="#">Catalogue</a>
            <a href="https://t.me/TON_ID" style="color: #229ED9;">Telegram</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-logo">
            <div class="hero-logo-yuko">YUKO</div>
            <div class="hero-logo-vape">VAPE</div>
        </div>

        <h1>Qualité. Fiabilité. Vitesse.</h1>
        <p class="tagline">Livraison en 1 semaine dans toute l'Europe.</p>
        
        <div class="btn-group">
            <a href="#" class="btn btn-primary">Voir le Catalogue</a>
            <a href="https://t.me/TON_ID" class="btn btn-telegram">Commander sur Telegram</a>
        </div>
    </section>

    <section class="features">
        <div class="feature-card"><h3>🚚 Logistique</h3><p>Expédition sécurisée sous 7 jours.</p></div>
        <div class="feature-card"><h3>💰 Tarifs B2B</h3><p>Prix directs usine.</p></div>
        <div class="feature-card"><h3>📍 Tracking</h3><p>Suivi en temps réel.</p></div>
    </section>
</body>
</html>
